<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>Kirchenraum Quiz - Feedback Edition</title>
    
    <!-- Bild-Beschleuniger -->
    <link rel="preload" as="image" href="kirche_bild.jpg">

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto; 
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 30px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            max-width: 1200px;
            justify-content: center;
        }

        .image-wrapper {
            position: relative;
            width: 800px; 
            height: 480px;
            background-image: url('kirche_bild.jpg');
            background-size: 100% 100%;
            border: 3px solid var(--primary);
            border-radius: 10px;
            flex-shrink: 0;
            touch-action: pan-y; 
        }

        .drop-zone {
            position: absolute;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.8);
            border: 3px dashed var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
        }

        /* Effekt wenn richtig */
        .drop-zone.correct { 
            background: var(--success) !important; 
            border: none; 
            color: white; 
            transform: translate(-50%, -50%) scale(1.1);
        }

        .terms-panel {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            min-width: 220px;
        }

        .draggable-item {
            padding: 15px 12px;
            background-color: var(--accent);
            color: white;
            border-radius: 8px;
            cursor: grab;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s ease;
            user-select: none;
            touch-action: manipulation; 
        }

        .draggable-item.selected { 
            background-color: var(--primary); 
            transform: scale(1.05); 
        }

        /* Wort leuchtet grün auf bevor es verschwindet */
        .draggable-item.correct-flash {
            background-color: var(--success) !important;
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--success);
        }

        .draggable-item.hidden { 
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none; 
        }

        /* Koordinaten */
        #zone-1 { top: 62%; left: 10%; } #zone-2 { top: 85%; left: 55%; }
        #zone-3 { top: 25%; left: 90%; } #zone-4 { top: 61%; left: 50%; }
        #zone-5 { top: 49%; left: 51%; } #zone-6 { top: 35%; left: 51%; }
        #zone-7 { top: 68%; left: 33%; } #zone-8 { top: 50%; left: 41%; }
        #zone-9 { top: 68%; left: 63%; } #zone-10 { top: 38%; left: 70%; }

        @media (max-width: 1000px) {
            .main-container { flex-direction: column; width: 100%; }
            .image-wrapper { width: 100%; height: auto; aspect-ratio: 800 / 480; }
            .terms-panel { grid-template-columns: 1fr 1fr; width: 100%; }
        }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 20px;">
    <h1>Kirchenraum-Quiz</h1>
    <p>Ordne die Begriffe den richtigen Stellen zu.</p>
</div>

<div class="main-container">
    <div class="image-wrapper" id="target-map">
        <div id="zone-1" class="drop-zone" data-target="Sakristei">?</div>
        <div id="zone-2" class="drop-zone" data-target="Weihwasserbecken">?</div>
        <div id="zone-3" class="drop-zone" data-target="Orgel">?</div>
        <div id="zone-4" class="drop-zone" data-target="Altar">?</div>
        <div id="zone-5" class="drop-zone" data-target="Tabernakel">?</div>
        <div id="zone-6" class="drop-zone" data-target="Ewiges Licht">?</div>
        <div id="zone-7" class="drop-zone" data-target="Taufbecken">?</div>
        <div id="zone-8" class="drop-zone" data-target="Osterkerze">?</div>
        <div id="zone-9" class="drop-zone" data-target="Ambo">?</div>
        <div id="zone-10" class="drop-zone" data-target="Kanzel">?</div>
    </div>

    <div class="terms-panel" id="source-terms">
        <div class="draggable-item" draggable="true" id="item-4">Altar</div>
        <div class="draggable-item" draggable="true" id="item-9">Ambo</div>
        <div class="draggable-item" draggable="true" id="item-6">Ewiges Licht</div>
        <div class="draggable-item" draggable="true" id="item-10">Kanzel</div>
        <div class="draggable-item" draggable="true" id="item-3">Orgel</div>
        <div class="draggable-item" draggable="true" id="item-8">Osterkerze</div>
        <div class="draggable-item" draggable="true" id="item-1">Sakristei</div>
        <div class="draggable-item" draggable="true" id="item-5">Tabernakel</div>
        <div class="draggable-item" draggable="true" id="item-7">Taufbecken</div>
        <div class="draggable-item" draggable="true" id="item-2">Weihwasserbecken</div>
    </div>
</div>

<button onclick="location.reload()" style="margin-top:20px; padding:12px 30px; border-radius:20px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer;">Reset</button>

<script>
    let selectedItem = null;

    function handleSelection(item) {
        document.querySelectorAll('.draggable-item').forEach(i => i.classList.remove('selected'));
        selectedItem = item;
        item.classList.add('selected');
    }

    document.querySelectorAll('.draggable-item').forEach(item => {
        item.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text', item.innerText);
            e.dataTransfer.setData('id', item.id);
        });
        item.addEventListener('click', () => handleSelection(item));
    });

    document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', (e) => e.preventDefault());
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            checkResult(e.dataTransfer.getData('text'), e.dataTransfer.getData('id'), zone);
        });
        zone.addEventListener('click', () => {
            if (selectedItem) checkResult(selectedItem.innerText, selectedItem.id, zone);
        });
    });

    function checkResult(term, id, zone) {
        if (term === zone.getAttribute('data-target')) {
            const el = document.getElementById(id);
            
            // 1. Zone wird grün
            zone.classList.add('correct');
            zone.innerText = '✓';
            
            // 2. Wort leuchtet grün auf
            if(el) {
                el.classList.add('correct-flash');
                setTimeout(() => {
                    el.classList.add('hidden');
                }, 400); // Verschwindet nach kurzem Leuchten
            }
            
            selectedItem = null;
        } else {
            zone.style.backgroundColor = '#e74c3c';
            zone.innerText = '✗';
            setTimeout(() => { 
                if(!zone.classList.contains('correct')) {
                    zone.style.backgroundColor = 'rgba(255, 255, 255, 0.7)'; 
                    zone.innerText = '?';
                }
            }, 600);
        }
    }
</script>
</body>
</html>
