<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login 🔒</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(180deg, #dff6ff, #fef6e4); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #ddd; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 15px; background: #60a5fa; color: white; font-size: 1rem; cursor: pointer; }
        .error { color: red; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>🔒 Klassenruhe</h1>
    <p>Bitte Passwort eingeben</p>

    <form onsubmit="checkLogin(event)">
        <input type="password" id="password" placeholder="Passwort" required>
        <button type="submit">Login</button>
    </form>

    <div id="error" class="error">Falsches Passwort 😅</div>
</div>

<script>
    // Diese Funktion macht aus einem Text einen unumkehrbaren Zahlencode
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash |= 0; 
        }
        return hash;
    }

    function checkLogin(event) {
        event.preventDefault();
        const input = document.getElementById("password").value;
        
        
        const targetHash = -1227038814;

        if (simpleHash(input) === targetHash) {
            sessionStorage.setItem("loggedIn", "true");
            const redirect = sessionStorage.getItem("redirectAfterLogin");
            window.location.href = redirect ? redirect : "schule.html";
        } else {
            document.getElementById("error").style.display = "block";
            document.getElementById("password").value = "";
        }
    }
</script>

</body>
</html>
