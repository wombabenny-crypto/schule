<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Klassenruhe 🌈</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #dff6ff, #fef6e4);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 35px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 { font-size: 2.2rem; color: #4b5563; margin-bottom: 10px; }
    .subtitle { color: #6b7280; margin-bottom: 25px; }

    .smiley {
      width: 200px;
      height: 200px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7rem;
      transition: 0.3s;
    }

    .good { background: #bbf7d0; box-shadow: 0 0 30px rgba(34,197,94,0.4); }
    .medium { background: #fde68a; box-shadow: 0 0 30px rgba(234,179,8,0.4); }
    .bad { background: #fecaca; box-shadow: 0 0 30px rgba(239,68,68,0.4); }

    .message {
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: #374151;
      min-height: 50px;
    }

    .progress-container {
      width: 100%;
      height: 35px;
      background: #e2e8f0;
      border-radius: 18px;
      margin: 10px 0 30px 0;
      overflow: hidden;
      border: 3px solid #f1f5f9;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #22c55e;
      transition: width 0.1s ease-out, background-color 0.3s;
    }

    .slider-box { margin: 25px 0; }
    label { display: block; margin-bottom: 10px; font-size: 1.1rem; color: #475569; }
    input[type=range] { width: 100%; cursor: pointer; }
