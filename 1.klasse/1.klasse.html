<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1. Klasse</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6fb;
    margin: 0;
}

/* Header */
h1 {
    text-align: center;
    padding: 20px;
    margin: 0;
}

/* Tabs */
.tab-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px;
}

.tab {
    padding: 12px 20px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    color: white;
    font-size: 14px;
}

/* Farben */
.tab1 { background: #3498db; }
.tab2 { background: #2ecc71; }
.tab3 { background: #e67e22; }

/* Inhalt */
.content {
    display: none;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

/* Aktiver Tab */
.active {
    display: block;
}

/* Dokument Rahmen */
.frame {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

/* Placeholder */
.placeholder {
    text-align: center;
    padding: 40px;
    color: #777;
}
</style>
 <!-- Passwort-Schutz -->
  <script>


if (sessionStorage.getItem("loggedIn") !== "true") {

    sessionStorage.setItem("redirectAfterLogin", window.location.href);

    window.location.href = "index.html";
}


</script>
</head>

<body>

<h1>📚 1. Klasse</h1>

<!-- Tabs -->
<div class="tab-bar">

    <button class="tab tab1" onclick="openTab('t1')">08.05.26</button>
    <button class="tab tab2" onclick="openTab('t2')">10.05.26</button>
    <button class="tab tab3" onclick="openTab('t3')">12.05.26</button>

</div>

<!-- Inhalte -->

<div id="t1" class="content active">
    <div class="placeholder">
        ➜ Hier kommt dein Material (Google Drive)
    </div>

    <!-- Beispiel später:
    <iframe class="frame" src="https://drive.google.com/file/d/ID/preview"></iframe>
    -->
</div>

<div id="t2" class="content">
    <div class="placeholder">
        ➜ Hier kommt dein Material (Google Drive)
    </div>
</div>

<div id="t3" class="content">
    <div class="placeholder">
        ➜ Hier kommt dein Material (Google Drive)
    </div>
</div>

<script>
function openTab(tabId) {
    var contents = document.getElementsByClassName("content");

    for (var i = 0; i < contents.length; i++) {
        contents[i].classList.remove("active");
    }

    document.getElementById(tabId).classList.add("active");
}
</script>

</body>
</html>
