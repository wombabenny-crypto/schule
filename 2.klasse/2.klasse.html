<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirchen-Quiz ⛪</title>
    <style>
        /* Grunddesign wie gehabt */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(180deg, #dff6ff, #fef6e4); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }

        /* Dein Home-Button Style */
        .home-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 10px 18px;
            border-radius: 15px;
            text-decoration: none;
            color: #4b5563;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
            border: 2px solid #e2e8f0;
            z-index: 1000;
        }

        .home-button:hover {
            background: #f8fafc;
            transform: scale(1.05);
        }

        /* Container für den Inhalt */
        .container { 
            width: 100%; 
            max-width: 900px; 
            background: white; 
            border-radius: 35px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
        }

        /* Platzhalter für das Spiel */
        .content-area {
            margin-top: 20px;
            min-height: 300px;
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }

        /* Mobile Optimierung */
        @media (max-width: 600px) {
            .home-button {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 0.9rem;
            }
        }
        .big-quiz-link {
    display: block;
    margin-top: 20px;
    padding: 15px;
    background: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 18px;
    font-weight: bold;
    transition: 0.3s;
}

.big-quiz-link:hover {
    background: #2980b9;
    transform: translateY(-2px);
}
    </style>

    <script>
        if (sessionStorage.getItem("loggedIn") !== "true") {
            sessionStorage.setItem("redirectAfterLogin", window.location.href);
            window.location.href = "../index.html";
        }
    </script>
</head>
<body>

    <a href="../schule.html" class="home-button">🏠 Home</a>

<img src="https://lh3.googleusercontent.com/u/0/d/1w32FnqDjxgXEPePHmVwRp8mcG_mMZKn6" 
     alt="Kirchenraum" 
     style="width: 100%; max-width: 800px; border-radius: 15px;">
    
   <a href="kirchengegenstaende.html" class="big-quiz-link">👉 Zum Kirchen-Quiz</a>
    

</body>
</html>
