<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* Jahreszeiten Titel */
.season {
    margin-top: 25px;
    font-size: 18px;
    font-weight: bold;
}

/* Farben für Jahreszeiten */
.herbst { color: #e67e22; }
.winter { color: #3498db; }
.fruehling { color: #2ecc71; }
.sommer { color: #e74c3c; }

/* Dropdown Buttons */
.accordion {
    background: #ffffff;
    cursor: pointer;
    padding: 14px;
    width: 100%;
    border: none;
    text-align: left;
    font-size: 15px;
    margin-top: 5px;
    border-radius: 8px;
    transition: 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.accordion:hover {
    background: #ecf0f1;
}

/* Inhalt */
.panel {
    display: none;
    padding: 15px;
    margin-bottom: 10px;
    background: white;
    border-radius: 8px;
}

/* Platzhalter */
.placeholder {
    text-align: center;
    color: #777;
    padding: 30px;
    border: 2px dashed #ccc;
    border-radius: 6px;
}

/* iframe */
.frame {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>📚 1. Klasse – Religion</h1>

<!-- HERBST -->
<div class="season herbst">🍂 Herbst</div>

<button class="accordion">08.10 – Schöpfung</button>

</div>

<button class="accordion">15.10 – Gott & Welt</button>

</div>

<!-- WINTER -->

<button class="accordion">10.12 – Advent</button>
<div class="panel">
    <div class="placeholder">➜ Material hier</div>
</div>

<button class="accordion">20.12 – Weihnachten</button>
<div class="panel">

</div>

<!-- FRÜHLING -->

<button class="accordion">20.03 – Ostern</button>

</div>

<!-- SOMMER -->

<button class="accordion">10.06 – Abschluss</button>
<div class="panel">
    <div class="placeholder">➜ Material hier</div>
</div>

<script>
var acc = document.getElementsByClassName("accordion");

for (let i = 0; i < acc.length; i++) {
    acc[i].addEventListener("click", function() {

        // alle schließen
        for (let j = 0; j < acc.length; j++) {
            acc[j].nextElementSibling.style.display = "none";
        }

        // nur dieses öffnen
        this.nextElementSibling.style.display = "block";
    });
}
</script>

</body>
