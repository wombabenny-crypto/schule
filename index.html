
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Klassenruhe 🌈</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, sans-serif;

    background:linear-gradient(
        180deg,
        #dff6ff,
        #fef6e4
    );

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.container{

    width:100%;
    max-width:500px;

    background:white;

    border-radius:35px;

    padding:30px;

    box-shadow:0 10px 30px rgba(0,0,0,0.1);

    text-align:center;
}

h1{

    font-size:2.2rem;
    color:#4b5563;

    margin-bottom:10px;
}

.subtitle{

    color:#6b7280;

    margin-bottom:25px;
}

.smiley{

    width:220px;
    height:220px;

    margin:0 auto 20px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:7rem;

    transition:0.3s;

    background:#fde68a;
}

.good{
    background:#bbf7d0;
    box-shadow:0 0 30px rgba(34,197,94,0.4);
}

.medium{
    background:#fde68a;
    box-shadow:0 0 30px rgba(234,179,8,0.4);
}

.bad{
    background:#fecaca;
    box-shadow:0 0 30px rgba(239,68,68,0.4);
}

.message{

    font-size:1.6rem;
    margin-bottom:20px;

    color:#374151;
    min-height:50px;
}

.volume{

    font-size:2.5rem;
    font-weight:bold;

    color:#334155;

    margin-bottom:20px;
}

.slider-box{

    margin:25px 0;
}

label{

    display:block;

    margin-bottom:10px;

    font-size:1.1rem;

    color:#475569;
}

input[type=range]{

    width:100%;
}

button{

    width:100%;

    padding:16px;

    border:none;

    border-radius:18px;

    margin-top:15px;

    font-size:1.1rem;

    cursor:pointer;

    transition:0.2s;
}

.start-btn{

    background:#60a5fa;
    color:white;
}

.start-btn:hover{
    transform:scale(1.02);
}

.music-btn{

    background:#c4b5fd;
    color:#312e81;
}

.counter{

    margin-top:25px;

    background:#f8fafc;

    border-radius:20px;

    padding:15px;

    font-size:1.2rem;

    color:#475569;
}

.tip{

    margin-top:20px;

    font-size:0.95rem;

    color:#64748b;
}

</style>
</head>

<body>

<div class="container">

    <h1>🌈 Klassenruhe</h1>

    <div class="subtitle">
        Gemeinsam schaffen wir eine ruhige Klasse 😊
    </div>

    <div id="smiley" class="smiley good">
        😊
    </div>

    <div id="message" class="message">
        Super ruhig 🌿
    </div>

    <div id="volume" class="volume">
        0
    </div>

    <div class="slider-box">

        <label>
            Empfindlichkeit:
            <span id="thresholdText">55</span>
        </label>

        <input
            type="range"
            min="20"
            max="120"
            value="55"
            id="threshold"
        >
    </div>

    <button
        class="start-btn"
        onclick="startMic()"
    >
        🎤 Mikrofon starten
    </button>

    <button
        class="music-btn"
        onclick="toggleMusic()"
        id="musicBtn"
    >
        🎵 Ruhige Musik starten
    </button>

    <div class="counter">
        🔴 Heute zu laut:
        <span id="redCounter">0</span> mal
    </div>

    <div class="tip">
        💡 Tipp:
        Sprecht leise miteinander und beobachtet den Smiley 😊
    </div>

</div>

<audio id="bgMusic" loop>
    <!-- Eigene MP3 einsetzen -->
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>

const smiley = document.getElementById("smiley");
const message = document.getElementById("message");
const volumeText = document.getElementById("volume");

const threshold =
    document.getElementById("threshold");

const thresholdText =
    document.getElementById("thresholdText");

let redCount = 0;
let wasBad = false;

threshold.oninput = () => {

    thresholdText.innerText =
        threshold.value;
};

async function startMic(){

    const stream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    const audioContext =
        new AudioContext();

    const microphone =
        audioContext.createMediaStreamSource(stream);

    const analyser =
        audioContext.createAnalyser();

    analyser.fftSize = 256;

    microphone.connect(analyser);

    const dataArray =
        new Uint8Array(analyser.frequencyBinCount);

    function update(){

        analyser.getByteFrequencyData(dataArray);

        let values = 0;

        for(let i = 0; i < dataArray.length; i++){

            values += dataArray[i];
        }

        let average =
            values / dataArray.length;

        average = Math.round(average);

        volumeText.innerText = average;

        updateMood(average);

        requestAnimationFrame(update);
    }

    update();
}

function updateMood(volume){

    const limit =
        parseInt(threshold.value);

    smiley.className = "smiley";

    // LEISE

    if(volume < limit * 0.4){

        smiley.innerText = "😊";

        smiley.classList.add("good");

        message.innerText =
            "Super ruhig 🌿";

        wasBad = false;
    }

    // MITTEL

    else if(volume < limit * 0.8){

        smiley.innerText = "😐";

        smiley.classList.add("medium");

        message.innerText =
            "Etwas leiser bitte 🌈";

        wasBad = false;
    }

    // ZU LAUT

    else{

        smiley.innerText = "😵";

        smiley.classList.add("bad");

        message.innerText =
            "Ups 😅 Wir schaffen das leiser";

        playSoftBell();

        if(!wasBad){

            redCount++;

            document.getElementById(
                "redCounter"
            ).innerText = redCount;

            wasBad = true;
        }
    }
}

let lastBell = 0;

function playSoftBell(){

    const now = Date.now();

    if(now - lastBell < 2000) return;

    lastBell = now;

    const audioContext = new (
        window.AudioContext ||
        window.webkitAudioContext
    )();

    const oscillator =
        audioContext.createOscillator();

    const gainNode =
        audioContext.createGain();

    oscillator.type = "triangle";

    oscillator.frequency.setValueAtTime(
        523.25,
        audioContext.currentTime
    );

    oscillator.frequency.exponentialRampToValueAtTime(
        659.25,
        audioContext.currentTime + 0.25
    );

    gainNode.gain.setValueAtTime(
        0.12,
        audioContext.currentTime
    );

    gainNode.gain.exponentialRampToValueAtTime(
        0.001,
        audioContext.currentTime + 1
    );

    oscillator.connect(gainNode);

    gainNode.connect(
        audioContext.destination
    );

    oscillator.start();

    oscillator.stop(
        audioContext.currentTime + 1
    );
}

function toggleMusic(){

    const music =
        document.getElementById("bgMusic");

    const btn =
        document.getElementById("musicBtn");

    if(music.paused){

        music.play();

        btn.innerText =
            "⏸ Musik stoppen";

    }else{

        music.pause();

        btn.innerText =
            "🎵 Ruhige Musik starten";
    }
}

</script>

</body>
</html>
