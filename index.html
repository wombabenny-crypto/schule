<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Klassenruhe 🌈</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #dff6ff, #fef6e4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 35px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { font-size: 2.2rem; color: #4b5563; margin-bottom: 10px; }
        .subtitle { color: #6b7280; margin-bottom: 25px; }

        .smiley {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7rem;
            transition: 0.3s;
        }

        .good { background: #bbf7d0; box-shadow: 0 0 30px rgba(34,197,94,0.4); }
        .medium { background: #fde68a; box-shadow: 0 0 30px rgba(234,179,8,0.4); }
        .bad { background: #fecaca; box-shadow: 0 0 30px rgba(239,68,68,0.4); }

        .message {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #374151;
            min-height: 50px;
        }

        .progress-container {
            width: 100%;
            height: 35px;
            background: #e2e8f0;
            border-radius: 18px;
            margin: 10px 0 30px 0;
            overflow: hidden;
            border: 3px solid #f1f5f9;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: width 0.1s ease-out, background-color 0.3s;
        }

        .slider-box { margin: 25px 0; }
        label { display: block; margin-bottom: 10px; font-size: 1.1rem; color: #475569; }
        input[type=range] { width: 100%; cursor: pointer; }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            margin-top: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .start-btn { background: #60a5fa; color: white; }
        .music-btn { background: #c4b5fd; color: #312e81; }

        .counter {
            margin-top: 25px;
            background: #f8fafc;
            border-radius: 20px;
            padding: 15px;
            font-size: 1.2rem;
            color: #475569;
        }

        .tip { margin-top: 20px; font-size: 0.95rem; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌈 Klassenruhe</h1>
    <div class="subtitle">Wir achten gemeinsam auf unsere Lautstärke</div>

    <div id="smiley" class="smiley good">😊</div>
    <div id="message" class="message">Super ruhig 🌿</div>

    <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
    </div>

    <div class="slider-box">
        <label>Empfindlichkeit: <span id="thresholdText">55</span></label>
        <input type="range" min="20" max="120" value="55" id="threshold">
    </div>

    <button class="start-btn" onclick="startMic()">🎤 Mikrofon starten</button>
    <button class="music-btn" onclick="toggleMusic()" id="musicBtn">🎵 Ruhige Musik starten</button>

    <div class="counter">
        🔴 Heute zu laut: <span id="redCounter">0</span> mal
    </div>

    <div class="tip">💡 Tipp: Haltet den Balken im grünen Bereich!</div>
</div>

<audio id="bgMusic" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
    const smiley = document.getElementById("smiley");
    const message = document.getElementById("message");
    const progressBar = document.getElementById("progressBar");
    const threshold = document.getElementById("threshold");
    const thresholdText = document.getElementById("thresholdText");

    let redCount = 0;
    let wasBad = false;
    let lastStatusChange = 0;
    const holdTime = 2000; 
    let currentMood = "good";

    threshold.oninput = () => {
        thresholdText.innerText = threshold.value;
    };

    async function startMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const microphone = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            microphone.connect(analyser);

            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function update() {
                analyser.getByteFrequencyData(dataArray);

                let values = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    values += dataArray[i];
                }

                let average = Math.round(values / dataArray.length);

                const limit = parseInt(threshold.value);

                let percentage = Math.min((average / limit) * 100, 100);
                progressBar.style.width = percentage + "%";

                // ✅ FESTE FARBZONEN
                if (percentage < 40) {
                    progressBar.style.backgroundColor = "#22c55e";
                } else if (percentage < 80) {
                    progressBar.style.backgroundColor = "#eab308";
                } else {
                    progressBar.style.backgroundColor = "#ef4444";
                }

                updateMood(average);
                requestAnimationFrame(update);
            }

            update();

        } catch (err) {
            alert("Mikrofon-Zugriff verweigert.");
        }
    }

    function updateMood(volume) {
        const limit = parseInt(threshold.value);
        const now = Date.now();

        let newMood = "good";

        if (volume >= limit * 0.8) {
            newMood = "bad";
        } else if (volume >= limit * 0.4) {
            newMood = "medium";
        }

        const moodOrder = { "good": 1, "medium": 2, "bad": 3 };

        if (moodOrder[newMood] > moodOrder[currentMood]) {
            currentMood = newMood;
            lastStatusChange = now;
        } else if (moodOrder[newMood] < moodOrder[currentMood]) {
            if (now - lastStatusChange >= holdTime) {
                currentMood = newMood;
                lastStatusChange = now;
            }
        }

        smiley.className = "smiley";

        if (currentMood === "good") {
            smiley.innerText = "😊";
            smiley.classList.add("good");
            message.innerText = "Super ruhig 🌿";
            wasBad = false;

        } else if (currentMood === "medium") {
            smiley.innerText = "😐";
            smiley.classList.add("medium");
            message.innerText = "Etwas leiser bitte 🌈";
            wasBad = false;

        } else if (currentMood === "bad") {
            smiley.innerText = "😵";
            smiley.classList.add("bad");
            message.innerText = "Ups 😅 Wir schaffen das leiser";

            playSoftBell();

            if (!wasBad) {
                redCount++;
                document.getElementById("redCounter").innerText = redCount;
                wasBad = true;
            }
        }
    }

    let lastBell = 0;

    function playSoftBell() {
        const now = Date.now();
        if (now - lastBell < 3000) return;

        lastBell = now;

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = "triangle";
        oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(659.25, audioContext.currentTime + 0.25);

        gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start();
        oscillator.stop(audioContext.currentTime + 1);
    }

    function toggleMusic() {
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");

        if (music.paused) {
            music.play();
            btn.innerText = "⏸ Musik stoppen";
        } else {
            music.pause();
            btn.innerText = "🎵 Ruhige Musik starten";
        }
    }
</script>

</body>
</html>
