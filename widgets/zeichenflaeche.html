<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { width: 100%; height: 100%; overflow: hidden; background: #ffffff; margin: 0; }
        
        /* Das Dock am unteren Bildschirmrand */
        #floating-toolbox { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); /* Zentriert die Leiste perfekt */
            z-index: 9999; 
            background: white; 
            padding: 10px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            border: 1px solid #ddd;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .t-btn { width: 50px; height: 50px; font-size: 24px; border: 1px solid #eee; background: #f9f9f9; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .t-btn:active { background: #e0e0e0; }
        
        #pop { display: none; position: absolute; z-index: 1000; background: white; border: 2px solid #9b59b6; border-radius: 8px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .opt { 
			padding: 15px; /* Größerer Klickbereich für den Finger */
			border-bottom: 1px solid #eee; 
			font-size: 18px; /* Bessere Lesbarkeit */
		}
        canvas { display: block; touch-action: none; width: 100vw; height: 100vh; }
		/* Verhindert das Scrollen und Refresh auf dem ganzen Handy-Screen */
		body {
			overscroll-behavior: none;
			touch-action: none;
		}
		#c { touch-action: none; }
		#text-menu {
			display: none;             /* Standardmäßig aus */
			position: fixed;
			bottom: 80px;             /* Direkt über der Toolbox (die wohl bei ca. 80-90px liegt) */
			left: 50%;                 /* Startet in der Mitte */
			transform: translateX(-50%); /* Zieht es exakt um die halbe Breite zurück, damit es perfekt mittig ist */
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(10px);
			padding: 8px 15px;
			border-radius: 50px;       /* Schön abgerundet wie ein "Pill"-Design */
			box-shadow: 0 10px 20px rgba(0,0,0,0.15);
			border: 1px solid rgba(0,0,0,0.05);
			display: flex;             /* Ändere dies auf 'flex' per JS bei Aktivierung */
			gap: 10px;
			z-index: 10000;
		}

		#text-menu button {
			border: none;
			background: #f0f0f0;
			width: 40px;
			height: 40px;
			border-radius: 50%; /* Runde Buttons wirken moderner */
			font-weight: bold;
			cursor: pointer;
			transition: all 0.2s;
		}

		#text-menu button:active { background: #3498db; color: white; }
		
		#eraser-size {
			position: absolute;
			bottom: 80px;      
			left: 50%;
			transform: translateX(-50%); /* Zentriert den Regler exakt */
			z-index: 1000;   /* Damit er über dem Canvas liegt */
			width: 200px;
			cursor: pointer;
		}
		.pill-menu {
			position: fixed;
			bottom: 80px;
			left: 50%;
			transform: translateX(-50%);
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(10px);
			padding: 8px 20px;
			border-radius: 50px;
			box-shadow: 0 10px 20px rgba(0,0,0,0.15);
			border: 1px solid rgba(0,0,0,0.05);
			z-index: 10000;
			display: flex;
			align-items: center;
			gap: 15px;
		}
		
    </style>
</head>
<body>
    <div id="floating-toolbox">
		<input type="color" onchange="updatePenSettings(this.value, false)" style="width:50px; height:50px; border:none; cursor:pointer;">
		<div id="pen-settings-bar" class="pill-menu" style="display: none;">
		<select onchange="updatePenSettings(this.value, true)" style="border: none; background: #f0f0f0; border-radius: 20px; padding: 5px;">
			<option value="#000000">Normal</option>
			<option value="#FFD700">Gold</option>
			<option value="#C0C0C0">Silber</option>
			<option value="#00FF00">Neon Grün</option>
		</select>
		<input type="range" min="1" max="20" value="2" oninput="App.penSettings.size = parseInt(this.value)">
		
	</div>
		
		
		<button class="t-btn" id="btn-pen" onclick="setMode('pen')">✏️</button>
		<button class="t-btn" onclick="handleEraserClick()" id="eraser-btn">🧽</button>
			<input type="range" id="eraser-size" min="5" max="60" value="20" style="display: none;" oninput="updateEraserSize(this.value)">
		<button class="t-btn" id="btn-text-lasso" onclick="setMode('text-lasso')">🔤</button>
		<button class="t-btn" id="btn-text-keyboard" onclick="setMode('text-keyboard')">⌨️</button>
		<input type="text" id="hidden-input" style="position: absolute; opacity: 0; z-index: -1;">
		<div id="text-menu" style="display: none;">
			<select onchange="updateTextSettings(this.value); App.render();" class="t-btn" style="width: 150px; font-size: 14px;">
				<option value="#000000">Normal</option>
				<option value="#FFD700">Gold</option>
				<option value="#FF00FF">Neon Pink</option>
				<option value="gradient">Regenbogen</option>
			</select>
			<input type="range" min="10" max="100" value="30" oninput="App.currentTextSettings.fontSize = parseInt(this.value); App.render();">
			<button onclick="updateStyle('bold')">B</button>
			<button onclick="updateStyle('italic')"><em>I</em></button>
			<button onclick="updateStyle('underline')"><u>U</u></button>
			<div style="width: 1px; background: #ccc; margin: 0 5px;"></div>
			<button onclick="updateStyle('align', 'left')">⫷</button>
			<button onclick="updateStyle('align', 'center')">⫷⫸</button>
		</div>
		<button class="t-btn" id="btn-move" onclick="setMode('move')">🖐️</button>
		<button class="t-btn" id="btn-transform" onclick="setMode('transform')">✥</button>
		<button class="t-btn" id="bUndo">⤺</button>
		<button class="t-btn" onclick="clearAll()" style="color:red;">✕</button>
		<button class="t-btn" onclick="document.getElementById('image-upload').click()">🖼️</button>

		<input type="file" id="image-upload" style="display:none" accept="image/*">
		<input type="text" id="image-url" placeholder="Bild-URL hier einfügen..." onkeydown="if(event.key==='Enter') loadImageUrl(this.value)">
	</div>




    <div id="pop"></div>
    <canvas id="c"></canvas>

    <script src="core.js"></script>
	<script src="bilder.js"></script>
	<script src="tool-stift.js"></script>
	<script src="radierer.js"></script>
	<script src="transform.js"></script>
	<script src="tool-lasso.js"></script>
	<script src="tool-undo.js"></script>
	
</body>
</html>
