<script>
    const smiley = document.getElementById("smiley");
    const message = document.getElementById("message");
    const progressBar = document.getElementById("progressBar");
    const threshold = document.getElementById("threshold");
    const thresholdText = document.getElementById("thresholdText");

    let redCount = 0;
    let wasBad = false;
    let lastStatusChange = 0;
    const holdTime = 2000; 
    let currentMood = "good";

    threshold.oninput = () => {
        thresholdText.innerText = threshold.value;
    };

    async function startMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const microphone = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            microphone.connect(analyser);

            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function update() {
                analyser.getByteFrequencyData(dataArray);
                let values = 0;
                for(let i = 0; i < dataArray.length; i++) {
                    values += dataArray[i];
                }
                let average = Math.round(values / dataArray.length);
                
                // --- VERBESSERTE BERECHNUNG DES BALKENS ---
                const limit = parseInt(threshold.value);
                // Der Balken erreicht 100%, wenn das Limit erreicht ist
                let percentage = Math.min((average / limit) * 100, 100);
                progressBar.style.width = percentage + "%";

                updateMood(average);
                requestAnimationFrame(update);
            }
            update();
        } catch (err) {
            alert("Mikrofon-Zugriff verweigert.");
        }
    }

    function updateMood(volume) {
        const limit = parseInt(threshold.value);
        const now = Date.now();
        
        let newMood = "good";
        // Alarm bei 80% des eingestellten Schwellenwerts
        if (volume >= limit * 0.8) {
            newMood = "bad";
        } else if (volume >= limit * 0.4) {
            newMood = "medium";
        }

        const moodOrder = { "good": 1, "medium": 2, "bad": 3 };

        if (moodOrder[newMood] > moodOrder[currentMood]) {
            currentMood = newMood;
            lastStatusChange = now;
        } else if (moodOrder[newMood] < moodOrder[currentMood]) {
            if (now - lastStatusChange >= holdTime) {
                currentMood = newMood;
                lastStatusChange = now;
            }
        }

        smiley.className = "smiley";
        
        if (currentMood === "good") {
            smiley.innerText = "😊";
            smiley.classList.add("good");
            message.innerText = "Super ruhig 🌿";
            progressBar.style.backgroundColor = "#22c55e"; 
            wasBad = false;
        } else if (currentMood === "medium") {
            smiley.innerText = "😐";
            smiley.classList.add("medium");
            message.innerText = "Etwas leiser bitte 🌈";
            progressBar.style.backgroundColor = "#eab308"; 
            wasBad = false;
        } else if (currentMood === "bad") {
            smiley.innerText = "😵";
            smiley.classList.add("bad");
            message.innerText = "Ups 😅 Wir schaffen das leiser";
            progressBar.style.backgroundColor = "#ef4444"; 
            
            playSoftBell();

            if (!wasBad) {
                redCount++;
                document.getElementById("redCounter").innerText = redCount;
                wasBad = true;
            }
        }
    }

    let lastBell = 0;
    function playSoftBell() {
        const now = Date.now();
        if (now - lastBell < 3000) return;
        lastBell = now;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        oscillator.type = "triangle";
        oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(659.25, audioContext.currentTime + 0.25);
        gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1);
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 1);
    }

    function toggleMusic() {
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");
        if (music.paused) {
            music.play();
            btn.innerText = "⏸ Musik stoppen";
        } else {
            music.pause();
            btn.innerText = "🎵 Ruhige Musik starten";
        }
    }
</script>
