<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirchen-Quiz ⛪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(180deg, #dff6ff, #fef6e4); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }

        .home-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 10px 18px;
            border-radius: 15px;
            text-decoration: none;
            color: #4b5563;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
            border: 2px solid #e2e8f0;
            z-index: 1000;
        }

        .home-button:hover { background: #f8fafc; transform: scale(1.05); }

        /* Der Haupt-Container, der alles untereinander hält */
        .container { 
            width: 100%; 
            max-width: 900px; 
            background: white; 
            border-radius: 35px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center;
            display: flex;
            flex-direction: column; /* Sorgt für die Anzeige untereinander */
            gap: 20px; /* Abstand zwischen den Elementen */
            align-items: center;
        }

        .church-img {
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .folder-container {
            width: 100%;
            border: 3px solid #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
        }

        .big-quiz-link {
            width: 100%;
            max-width: 500px;
            padding: 18px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 18px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .big-quiz-link:hover { background: #2980b9; transform: translateY(-2px); }

        @media (max-width: 600px) {
            .home-button { top: 10px; right: 10px; padding: 8px 12px; font-size: 0.9rem; }
        }
    </style>

    <script>
        if (sessionStorage.getItem("loggedIn") !== "true") {
            sessionStorage.setItem("redirectAfterLogin", window.location.href);
            window.location.href = "../index.html";
        }
    </script>
</head>
<body>

    <a href="../schule.html" class="home-button">🏠 Home</a>

    <div class="container">
        <h1>Kirchengegenstände</h1>
        
        <img src="https://lh3.googleusercontent.com/d/1w32FnqDjxgXEPePHmVwRp8mcG_mMZKn6" 
             alt="Kirchenraum" class="church-img">

        <div class="folder-container">
            <iframe src="https://drive.google.com/embeddedfolderview?id=1L6QmcJIvXQfKpr6QcahyX_NW3Rzz9uvz#grid" 
                    style="width:100%; height:450px; border:0;">
            </iframe>
        </div>

        <a href="kirchengegenstaende.html" class="big-quiz-link">👉 Zum interaktiven Kirchen-Quiz</a>
    </div>

</body>
</html>
