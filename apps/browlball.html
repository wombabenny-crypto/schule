<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schul-Brawlball</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #222; color: white; font-family: sans-serif; }
        canvas { border: 5px solid #fff; background: #2e7d32; cursor: none; }
        .controls { margin-top: 10px; display: flex; gap: 20px; }
    </style>
</head>
<body>
    <h1>Brawlball JS</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div class="controls">
        <p><strong>Spieler 1 (Blau):</strong> W, A, S, D</p>
        <p><strong>Spieler 2 (Rot):</strong> Pfeiltasten</p>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const ball = { x: 400, y: 200, r: 10, dx: 0, dy: 0, friction: 0.98 };
        const p1 = { x: 100, y: 200, r: 15, color: "#2196F3", score: 0, speed: 5 };
        const p2 = { x: 700, y: 200, r: 15, color: "#F44336", score: 0, speed: 5 };

        // Touch-Positionen speichern
        const touches = { p1: { x: 0, y: 0, active: false }, p2: { x: 0, y: 0, active: false } };

        // Touch-Events
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                let t = e.touches[i];
                let rect = canvas.getBoundingClientRect();
                let x = t.clientX - rect.left;
                let y = t.clientY - rect.top;

                if (x < canvas.width / 2) {
                    p1.x = x; p1.y = y;
                } else {
                    p2.x = x; p2.y = y;
                }
            }
        }, {passive: false});

        function update() {
            // Ball-Physik
            ball.x += ball.dx; ball.y += ball.dy;
            ball.dx *= ball.friction; ball.dy *= ball.friction;

            // Kollision
            [p1, p2].forEach(p => {
                let dist = Math.hypot(p.x - ball.x, p.y - ball.y);
                if (dist < p.r + ball.r) {
                    let angle = Math.atan2(ball.y - p.y, ball.x - p.x);
                    ball.dx = Math.cos(angle) * 8;
                    ball.dy = Math.sin(angle) * 8;
                }
            });

            // Wände & Tore (wie gehabt)
            if (ball.y < 0 || ball.y > canvas.height) ball.dy *= -1;
            if (ball.x < 0) { if (ball.y > 150 && ball.y < 250) { p2.score++; resetBall(); } else { ball.dx *= -1; } }
            if (ball.x > canvas.width) { if (ball.y > 150 && ball.y < 250) { p1.score++; resetBall(); } else { ball.dx *= -1; } }
        }

        function resetBall() { ball.x = 400; ball.y = 200; ball.dx = 0; ball.dy = 0; }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // ... (Hier den gleichen Code wie oben für Mittellinie, Tore, Ball & Spieler verwenden)
            // Zeichne den Ball und die Spieler...
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = p1.color; ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = p2.color; ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.r, 0, Math.PI*2); ctx.fill();

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>

</body>
</html>
