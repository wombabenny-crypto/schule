<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kirchenraum Quiz - Universal Fix</title>
    
    <script>
        if (sessionStorage.getItem("loggedIn") !== "true") {
            sessionStorage.setItem("redirectAfterLogin", window.location.href);
            window.location.href = "../index.html";
        }
    </script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            /* Ermöglicht sauberes Scrollen am Handy */
            overflow-y: auto;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .main-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 30px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            max-width: 1200px;
            justify-content: center;
            align-items: flex-start;
        }

        .image-wrapper {
            position: relative;
            width: 800px; 
            height: 480px;
            background-image: url('kirche_bild.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border: 3px solid var(--primary);
            border-radius: 10px;
            flex-shrink: 0;
            /* Wichtig: Verhindert, dass das Bild am Handy das Wischen abfängt */
            touch-action: pan-y;
        }

        .drop-zone {
            position: absolute;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.8);
            border: 3px dashed var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s, background 0.2s;
        }

        .drop-zone.correct {
            background: var(--success) !important;
            border: none;
            color: white;
            box-shadow: 0 0 15px var(--success);
        }

        .terms-panel {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            min-width: 220px;
        }

        .draggable-item {
            padding: 15px 10px;
            background-color: var(--accent);
            color: white;
            border-radius: 8px;
            cursor: grab;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            user-select: none;
            /* Erlaubt vertikales Scrollen trotz Drag-Möglichkeit */
            touch-action: manipulation;
        }

        .draggable-item.selected {
            background-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent);
        }

        .draggable-item.hidden {
            visibility: hidden;
            pointer-events: none;
        }

        .home-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 10px 18px;
            border-radius: 15px;
            text-decoration: none;
            color: #4b5563;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid #e2e8f0;
            z-index: 1000;
        }

        /* --- MOBILE ANPASSUNG --- */
        @media (max-width: 1000px) {
            .main-container {
                flex-direction: column;
                align-items: center;
                width: 100%;
                padding: 15px;
            }
            .image-wrapper { 
                width: 100%;
                max-width: 600px;
                height: auto;
                aspect-ratio: 800 / 480; 
            }
            .terms-panel {
                grid-template-columns: 1fr 1fr;
                width: 100%;
            }
            .drop-zone {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<a href="../schule.html" class="home-button">🏠 Home</a>

<div class="header">
    <h1>Kirchenraum-Quiz</h1>
    <p>Laptop: Ziehen | Handy: Tippen & Scrollen</p>
</div>

<div class="main-container">
    <div class="image-wrapper" id="target-map">
        <div id="zone-1" class="drop-zone" data-target="Sakristei">?</div>
        <div id="zone-2" class="drop-zone" data-target="Weihwasserbecken">?</div>
        <div id="zone-3" class="drop-zone" data-target="Orgel">?</div>
        <div id="zone-4" class="drop-zone" data-target="Altar">?</div>
        <div id="zone-5" class="drop-zone" data-target="Tabernakel">?</div>
        <div id="zone-6" class="drop-zone" data-target="Ewiges Licht">?</div>
        <div id="zone-7" class="drop-zone" data-target="Taufbecken">?</div>
        <div id="zone-8" class="drop-zone" data-target="Osterkerze">?</div>
        <div id="zone-9" class="drop-zone" data-target="Ambo">?</div>
        <div id="zone-10" class="drop-zone" data-target="Kanzel">?</div>
    </div>

    <div class="terms-panel" id="source-terms">
        <div class="draggable-item" draggable="true" id="item-4">Altar</div>
        <div class="draggable-item" draggable="true" id="item-9">Ambo</div>
        <div class="draggable-item" draggable="true" id="item-6">Ewiges Licht</div>
        <div class="draggable-item" draggable="true" id="item-10">Kanzel</div>
        <div class="draggable-item" draggable="true" id="item-3">Orgel</div>
        <div class="draggable-item" draggable="true" id="item-8">Osterkerze</div>
        <div class="draggable-item" draggable="true" id="item-1">Sakristei</div>
        <div class="draggable-item" draggable="true" id="item-5">Tabernakel</div>
        <div class="draggable-item" draggable="true" id="item-7">Taufbecken</div>
        <div class="draggable-item" draggable="true" id="item-2">Weihwasserbecken</div>
    </div>
</div>

<button onclick="location.reload()" style="margin-top:30px; padding:12px 30px; border-radius:25px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">Spiel zurücksetzen</button>

<script>
    let selectedItem = null;

    // --- Begriffe Setup ---
    document.querySelectorAll('.draggable-item').forEach(item => {
        // Drag-Event für Laptop
        item.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text', item.innerText);
            e.dataTransfer.setData('id', item.id);
            item.classList.add('selected');
        });

        item.addEventListener('dragend', () => {
            item.classList.remove('selected');
        });

        // Klick-Event für Handy/Tablet
        item.addEventListener('click', () => {
            document.querySelectorAll('.draggable-item').forEach(i => i.classList.remove('selected'));
            selectedItem = item;
            item.classList.add('selected');
        });
    });

    // --- Zonen Setup ---
    document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', (e) => {
            e.preventDefault(); // Nötig für Drop
        });

        // Drop-Event (Laptop)
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            const term = e.dataTransfer.getData('text');
            const id = e.dataTransfer.getData('id');
            checkResult(term, id, zone);
        });

        // Klick-Event (Handy)
        zone.addEventListener('click', () => {
            if (selectedItem) {
                checkResult(selectedItem.innerText, selectedItem.id, zone);
            }
        });
    });

    function checkResult(term, id, zone) {
        if (term === zone.getAttribute('data-target')) {
            zone.classList.add('correct');
            zone.innerText = '✓';
            const element = document.getElementById(id);
            if (element) element.classList.add('hidden');
            selectedItem = null;
        } else {
            // Fehler-Feedback
            zone.style.backgroundColor = '#e74c3c';
            zone.innerText = '✗';
            setTimeout(() => {
                if (!zone.classList.contains('correct')) {
                    zone.style.backgroundColor = 'rgba(255, 255, 255, 0.8)';
                    zone.innerText = '?';
                }
            }, 800);
        }
    }
</script>
</body>
</html>
