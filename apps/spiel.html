<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Liturgischer Sakristei-Simulator</title>
    <style>
        :root { --p-gold: #d4af37; --p-violett: #5b2c6f; --p-red: #c0392b; --p-green: #1e8449; }
        body { font-family: 'Segoe UI', sans-serif; background: #dfe6e9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .game-wrapper { display: flex; gap: 30px; background: white; padding: 30px; border-radius: 20px; shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        /* Das Spielfeld */
        #stage { 
            position: relative; width: 350px; height: 600px; 
            background: #f9f9f9; border: 4px solid #34495e; border-radius: 15px; overflow: hidden;
        }

        .layer { 
            position: absolute; 
            background-image: url('watermarked_img_3309435475592538825.png'); 
            background-repeat: no-repeat;
            transform-origin: top center;
            display: none;
        }

        /* Skalierungs-Logik für korrekte Proportionen */
        #base-body { display: block; width: 150px; height: 430px; background-position: -425px -45px; top: 80px; left: 100px; z-index: 1; }
        
        /* Albe & Talar werden im Code vergrößert (scale), damit sie bis zum Boden reichen */
        #layer-albe { width: 190px; height: 430px; background-position: -20px -30px; top: 95px; left: 80px; z-index: 10; transform: scale(1.15); }
        #layer-talar { width: 170px; height: 430px; background-position: -230px -30px; top: 95px; left: 90px; z-index: 10; transform: scale(1.15); }
        
        #layer-zingulum { width: 130px; height: 130px; background-position: -620px -670px; top: 290px; left: 110px; z-index: 15; }
        #layer-chorrock { width: 180px; height: 230px; background-position: -790px -50px; top: 100px; left: 85px; z-index: 20; transform: scale(1.1); }
        
        #layer-kasel { width: 230px; height: 350px; top: 90px; left: 60px; z-index: 30; transform: scale(1.05); }
        #layer-stola { width: 150px; height: 350px; top: 90px; left: 100px; z-index: 35; transform: scale(1.05); }

        /* Menü */
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .control-group { border-left: 5px solid #3498db; padding-left: 15px; margin-bottom: 10px; }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: #2c3e50; }
        
        button { padding: 10px; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #f0f0f0; }
        button.active { background: #3498db; color: white; border-color: #2980b9; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .reset-btn { background: #ff7675; color: white; border: none; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Liturgischer Simulator</h1>

    <div class="game-wrapper">
        <div id="stage">
            <div id="base-body" class="layer"></div>
            <div id="layer-talar" class="layer"></div>
            <div id="layer-albe" class="layer"></div>
            <div id="layer-zingulum" class="layer"></div>
            <div id="layer-chorrock" class="layer"></div>
            <div id="layer-kasel" class="layer"></div>
            <div id="layer-stola" class="layer"></div>
        </div>

        <div class="sidebar">
            <div class="control-group">
                <h3>1. Grundgewand</h3>
                <div class="grid">
                    <button id="btn-talar" onclick="setBase('talar')">Talar</button>
                    <button id="btn-albe" onclick="setBase('albe')">Albe</button>
                </div>
            </div>

            <div class="control-group">
                <h3>2. Accessoires</h3>
                <div class="grid">
                    <button id="btn-zing" onclick="toggleLayer('layer-zingulum', 'btn-zing')">Zingulum</button>
                    <button id="btn-chor" onclick="toggleLayer('layer-chorrock', 'btn-chor')">Chorrock</button>
                </div>
            </div>

            <div class="control-group">
                <h3>3. Liturgische Farbe</h3>
                <div class="grid">
                    <button onclick="updateColor('green')">Grün</button>
                    <button onclick="updateColor('red')">Rot</button>
                    <button onclick="updateColor('violett')">Violett</button>
                    <button onclick="updateColor('gold')">Gold</button>
                </div>
                <p id="color-label" style="text-align:center; font-weight:bold; color:#3498db; margin-top:5px;">Farbe: Keine</p>
            </div>

            <button class="reset-btn" onclick="location.reload()">Alles Ausziehen</button>
        </div>
    </div>

    <script>
        const kaselPos = {
            'green': '-585px -40px',
            'red': '-785px -40px',
            'violett': '-30px -455px',
            'gold': '-590px -455px'
        };

        const stolaPos = {
            'violett': '-255px -455px',
            'gold': '-825px -455px'
        };

        function setBase(type) {
            // Entweder Albe oder Talar
            document.getElementById('layer-albe').style.display = (type === 'albe') ? 'block' : 'none';
            document.getElementById('layer-talar').style.display = (type === 'talar') ? 'block' : 'none';
            document.getElementById('btn-albe').classList.toggle('active', type === 'albe');
            document.getElementById('btn-talar').classList.toggle('active', type === 'talar');
        }

        function toggleLayer(id, btnId) {
            const el = document.getElementById(id);
            const isVisible = el.style.display === 'block';
            el.style.display = isVisible ? 'none' : 'block';
            document.getElementById(btnId).classList.toggle('active', !isVisible);
        }

        function updateColor(color) {
            const kasel = document.getElementById('layer-kasel');
            const stola = document.getElementById('layer-stola');
            
            kasel.style.display = 'block';
            kasel.style.backgroundPosition = kaselPos[color];
            
            // Stola nur für Violett und Gold (laut Asset-Sheet)
            if(stolaPos[color]) {
                stola.style.display = 'block';
                stola.style.backgroundPosition = stolaPos[color];
            } else {
                stola.style.display = 'none';
            }
            
            document.getElementById('color-label').innerText = "Farbe: " + color.charAt(0).toUpperCase() + color.slice(1);
        }
    </script>
</body>
</html>
