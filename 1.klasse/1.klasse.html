<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Religion 1. Klasse</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f0f2f5;
    text-align: center;
}

/* Header */
.header {
    background: #4CAF50;
    color: white;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* Grid Layout */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* App Buttons */
.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.2s;
    font-size: 16px;
}

.card:hover {
    transform: scale(1.05);
}

/* Inhalte */
.content {
    display: none;
    margin: 20px;
    padding: 20px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}


</style>
<!-- Passwort-Schutz -->
  <script>


if (sessionStorage.getItem("loggedIn") !== "true") {

    sessionStorage.setItem("redirectAfterLogin", window.location.href);

    window.location.href = "../index.html";
}


</script>
</head>

<body>


<div class="header" style="
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
">

    <!-- LINKS: Zurück -->
    <button onclick="goBack()" style="
        background: white;
        border: none;
        border-radius: 12px;
        padding: 10px 15px;
        cursor: pointer;
        font-size: 18px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    ">
        ←
    </button>

    <!-- MITTE: Titel -->
    <div style="
        flex: 1;
        text-align: center;
        font-weight: bold;
        font-size: 18px;
    ">
        📖 Religion – 1. Klasse
    </div>

    <!-- RECHTS: Home -->
    <button onclick="goHome()" style="
        background: white;
        border: none;
        border-radius: 12px;
        padding: 10px 15px;
        cursor: pointer;
        font-size: 18px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    ">
        🏠
    </button>

</div>

<div class="grid">

<div class="card" onclick="toggle('sep')">📅 September</div>
<div class="card" onclick="toggle('okt')">🍂 Oktober</div>
<div class="card" onclick="toggle('nov')">🌧️ November</div>
<div class="card" onclick="toggle('dez')">🎄 Dezember</div>

<div class="card" onclick="toggle('jan')">❄ Januar</div>
<div class="card" onclick="toggle('feb')">⛄ Februar</div>
<div class="card" onclick="toggle('mär')">🌱 März</div>

<div class="card" onclick="toggle('apr')">🌸 April</div>
<div class="card" onclick="toggle('mai')">🌼 Mai</div>
<div class="card" onclick="toggle('jun')">☀ Juni</div>

</div>

<!-- Inhalte -->

<div id="sep" class="content">
<h2>September</h2>
<p>Stunden 1–8</p>

<!-- Beispiel Drive -->
<!-- HIER DEIN ORDNER -->
</div>

<div id="okt" class="content"><h2>Oktober</h2></div>
<div id="nov" class="content"><h2>November</h2></div>
<div id="dez" class="content"><h2>Dezember</h2></div>

<div id="jan" class="content"><h2>Januar</h2></div>
<div id="feb" class="content"><h2>Februar</h2></div>
<div id="mär" class="content"><h2>März</h2></div>

<div id="apr" class="content"><h2>April</h2></div>
<div id="mai" class="content"><h2>Mai</h2></div>
<div id="jun" class="content"><h2>Juni</h2></div>

<script>
function toggle(id) {

    // alles schließen
    document.querySelectorAll(".content").forEach(el => {
        if (el.id !== id) el.style.display = "none";
    });

    var el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}

function goBack() {
    window.history.back();
}


function goHome() {
    window.location.href = "../schule.html";
}

</script>

</body>
</html>
